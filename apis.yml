apis:
- aid: bank-of-us:bank-of-us-cdr-product-reference-data-api
  name: Bank of us CDR Product Reference Data API
  tags:
  - Open Banking
  - CDR
  - Product Reference Data
  - Banking
  - Products
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bankofus.com.au/open-banking
  baseURL: https://api.bankofus.com.au/OpenBanking/cds-au/v1
  properties:
  - url: https://www.bankofus.com.au/open-banking
    type: Documentation
  - url: https://consumerdatastandardsaustralia.github.io/standards/#get-products
    type: APIReference
  - url: openapi/bank-of-us-cds-banking-products-openapi.yml
    type: OpenAPI
  description: Public, unauthenticated Consumer Data Right Product Reference Data (PRD)
    API. A live GET on https://api.bankofus.com.au/OpenBanking/cds-au/v1/banking/products
    returns HTTP 200 with an x-v response header of 4 and a data.products array (27
    products across home loans, personal/business banking, savings, and term deposits
    at the time of review). The endpoint conforms to the DSB Consumer Data Standards
    CDR Banking API (v1.36.0) and supports GET /banking/products and GET /banking/products/{productId}.
