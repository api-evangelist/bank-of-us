name: Bank of us
kind: company
description: Bank of us is Tasmania's only customer-owned bank, a mutual authorised
  deposit-taking institution (ADI) trading as B&E Ltd (brand "BNE LTD") and headquartered
  in Launceston, Tasmania. Formed from the former Bass & Equitable Building Society
  and rebranded to Bank of us in 2016, it is owned by its members rather than shareholders
  and offers home loans, personal and business banking, savings, and term deposits.
  As a regulated ADI it participates in Australia's Consumer Data Right (CDR / Open
  Banking) as a data holder, exposing a public, unauthenticated Product Reference Data
  (PRD) API that conforms to the Data Standards Body (DSB) Consumer Data Standards,
  and enabling customers to share account and transaction data with accredited data
  recipients under ACCC oversight.
